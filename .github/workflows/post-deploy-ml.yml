name: Post-deploy ML health

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
  schedule:
    # Staging smoke every 30 minutes; weekly retrain Sunday 04:30 UTC
    - cron: "*/30 * * * *"
    - cron: "30 4 * * 0"

jobs:
  heal-and-verify:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && github.event.schedule == '*/30 * * * *')
    env:
      ENV_TARGET: ${{ github.event.inputs.environment || 'staging' }}
      FINU_ML_CREDIT_URL: ${{ (github.event.inputs.environment || 'staging') == 'production' && secrets.FINU_ML_CREDIT_URL_PRODUCTION || secrets.FINU_ML_CREDIT_URL_STAGING }}
      FINU_ML_CREDIT: ${{ (github.event.inputs.environment || 'staging') == 'production' && secrets.FINU_ML_CREDIT_URL_PRODUCTION || secrets.FINU_ML_CREDIT_URL_STAGING }}
      FINU_WEB: ${{ (github.event.inputs.environment || 'staging') == 'production' && secrets.FINU_WEB_PRODUCTION || secrets.FINU_WEB_STAGING }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      SEED_EMAIL: ${{ secrets.SEED_EMAIL }}
      SEED_PASSWORD: ${{ secrets.SEED_PASSWORD }}
    steps:
      - name: Checkout finu-ml-credit
        uses: actions/checkout@v4

      - name: Checkout finu-platform-infra
        uses: actions/checkout@v4
        with:
          repository: levinnovation/finu-platform-infra
          path: infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}

      - name: Heal champion if needed
        continue-on-error: true
        run: |
          chmod +x infra/scripts/heal-credit-ml-champion.sh
          bash infra/scripts/heal-credit-ml-champion.sh

      - name: Verify credit pipeline
        run: |
          chmod +x infra/scripts/verify-credit-pipeline.sh
          bash infra/scripts/verify-credit-pipeline.sh

      - name: Heal Shield if needed
        continue-on-error: true
        env:
          ML_INTERNAL_SECRET: ${{ secrets.ML_INTERNAL_SECRET }}
        run: |
          chmod +x infra/scripts/heal-shield-ml-champion.sh
          bash infra/scripts/heal-shield-ml-champion.sh

      - name: Verify shield pipeline
        continue-on-error: true
        env:
          SHIELD_WEBHOOK_SECRET: ${{ secrets.SHIELD_WEBHOOK_SECRET }}
          ML_INTERNAL_SECRET: ${{ secrets.ML_INTERNAL_SECRET }}
        run: |
          chmod +x infra/scripts/verify-shield-pipeline.sh
          bash infra/scripts/verify-shield-pipeline.sh

  weekly-credit-retrain:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '30 4 * * 0'
    env:
      FINU_ML_CREDIT_URL: ${{ secrets.FINU_ML_CREDIT_URL_STAGING }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Credit retrain (staging)
        continue-on-error: true
        run: |
          curl -sf -X POST -H "x-cron-secret: ${CRON_SECRET}" \
            "${FINU_ML_CREDIT_URL}/credit/retrain?dry_run=1" | python3 -m json.tool || true
          curl -sf -X POST -H "x-cron-secret: ${CRON_SECRET}" \
            "${FINU_ML_CREDIT_URL}/credit/retrain" | python3 -m json.tool || true
          curl -sf -X POST -H "x-cron-secret: ${CRON_SECRET}" \
            "${FINU_ML_CREDIT_URL}/credit/sync-mlflow" | python3 -m json.tool || true
